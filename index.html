<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryVerse</title>
<style>

body{
  margin:0;
  font-family:Georgia, serif;
  background:#dcf1f1;
  padding-bottom:80px;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:#2b2b2b;
  color:white;
}

/* SEARCH BOX */
.search-box{
  width:90%;
  max-width:400px;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* NAV MENU */
.menu{
  margin-top:15px;
  display:flex;
  justify-content:center;
  flex-wrap:nowrap; /* prevent wrapping */
  gap:10px;
}

.menu a{
  text-decoration:none;
  color:white;
  font-size:14px;
  padding:6px 10px;
  border-radius:6px;
  white-space:nowrap; /* prevent breaking */
  flex-shrink:0;
}

.menu a:hover{
  background:#444;
  color:#00ccff;
}

/* CENTER WEBSITE */
.section{
  padding:25px;
  max-width:1100px;
  margin:auto;
}

/* CATEGORY TITLE */
.section h2{
  margin-bottom:10px;
  font-size:22px;
  font-weight:bold;
}

.category-box{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:25px;
  box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

/* HORIZONTAL SCROLL (story-grid) */
.story-grid{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding-bottom:10px;
  scroll-behavior:smooth;
}

/* hide scrollbar */
.story-grid::-webkit-scrollbar{
  display:none;
}

/* STORY CARD */
.story-card{
  min-width:100px;
  max-width:100px;
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.15);
  cursor:pointer;
  transition:transform 0.2s;
  position: relative; /* for overlay */
}

.story-card:hover{
  transform:scale(1.05);
}

/* DARK HOVER OVERLAY */
.story-card::after{
  content:"Read";
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.6);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  opacity:0;
  transition:0.3s;
}

.story-card:hover::after{
  opacity:1;
}

/* SQUARE IMAGE */
.story-card img{
  width:100%;
  height:100%;
  aspect-ratio:1/1;
}

/* STORY INFO */
.story-info{
  padding:2px;
  display:flex;
  flex-direction:column;
}

.story-info h3{
  margin:4px 0;
  font-size:13px;
}

/* MOBILE */
@media (max-width:600px){
  .story-card{
    min-width:85px;
    max-width:85px;
  }

  /* NAV MENU MOBILE FIX */
  .menu{
    justify-content:space-around; /* evenly spread items */
  }

  .menu a{
    font-size:12px;
    padding:4px 6px;
  }
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  margin-top:20px;
}

</style>
</head>
